project:
  type: website
  output-dir: docs
  # Copy the source scripts into the site so the "defined in utils/..." links in
  # the write-ups resolve on the deployed site (docs/reports/ -> ../utils, ../code).
  resources:
    - utils/*.R
    - code/*.R
  render:
    - index.qmd
    - reports/task1.qmd
    - reports/task2.qmd
    - reports/task3.qmd
    - reports/task4.qmd
    - ai_memo.md

website:
  title: "Verasight DS Case Study"
  navbar:
    left:
      - href: index.qmd
        text: "Home"
      - text: "Tasks"
        menu:
          - href: reports/task1.qmd
            text: "Task 1: Weighted crosstabs"
          - href: reports/task2.qmd
            text: "Task 2: Response density"
          - href: reports/task3.qmd
            text: "Task 3: Fraud detection"
          - href: reports/task4.qmd
            text: "Task 4: Project scoping"
      - href: ai_memo.md
        text: "AI Memo"
  page-footer: "Verasight Data Scientist Case Study"

format:
  html:
    theme: litera
    css: styles.css
    toc: true
    # NOTE: no `embed-resources` here. This is a `type: website` project, and a
    # website render cannot inline htmlwidget (plotly) libraries — with embedding
    # on, Quarto writes ../site_libs/ links but never creates the folder (→ 404 on
    # the interactive figures). Leaving it off lets the render populate docs/site_libs/.
